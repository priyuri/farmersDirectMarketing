<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
    <link rel="stylesheet" href="register.css">
</head>

<body>
    <div class="container">

        <h2>Register</h2>

        <form id="form">
            <input type="text" id="name" placeholder="Full Name" class="msgInput"><br><br>
            <input type="text" id="address" placeholder="Address" class="msgInput"><br><br>

            Gender:
            <input type="radio" name="gender" value="Male"> Male
            <input type="radio" name="gender" value="Female"> Female
            <br><br>

            <input type="email" id="email" placeholder="Email" class="msgInput"><br><br>
            <input type="password" id="password" placeholder="Password" class="msgInput"><br><br>

            <button type="submit" id="btn">Register</button>
            <input type="reset" value="Reset" id="reset">
        </form>

        <p id="msg"></p>


        <script>
            const form = document.getElementById("form");

            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const fullName = document.getElementById("name").value.trim();
                const address = document.getElementById("address").value.trim();
                const email = document.getElementById("email").value.trim();
                const password = document.getElementById("password").value.trim();
                const gender = document.querySelector('input[name="gender"]:checked')?.value;

                const msg = document.getElementById("msg");

                //  VALIDATION 

                if (!fullName || !address || !email || !password || !gender) {
                    msg.innerText = "All fields are required ❗";
                    msg.style.color = "red";
                    return;
                }

                // Email format check
                if (!email.includes("@") || !email.includes(".")) {
                    msg.innerText = "Invalid email format ❗";
                    msg.style.color = "red";
                    return;
                }

                // Password length check
                if (password.length < 6) {
                    msg.innerText = "Password must be at least 6 characters ❗";
                    msg.style.color = "red";
                    return;
                }

                // Name validation (no numbers)
                if (/\d/.test(fullName)) {
                    msg.innerText = "Name should not contain numbers ❗";
                    msg.style.color = "red";
                    return;
                }

                // 🔵 If all valid → send data
                const res = await fetch("http://localhost:5000/api/auth/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ fullName, address, gender, email, password })
                });

                const data = await res.text();

                msg.innerText = data;
                msg.style.color = "green";
            });
        </script>

    </div>

</body>

</html>
